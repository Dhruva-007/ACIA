[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    --verbose
    --tb=short
    --strict-markers
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (require running services)
    slow: Tests that take more than 1 second